
name: Generate Snake Animation

on:
  # Régénère le snake une fois par jour
  schedule:
    - cron: "0 0 * * *"
  # Permet de le lancer manuellement depuis l'onglet Actions
  workflow_dispatch:
  # Régénère à chaque push sur la branche par défaut
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Snake orange + cases en dégradé navy → orange (couleurs SmartOps)
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=e67e22&color_dots=#0d2137,#234e7a,#1a3a5f,#d35400,#e67e22

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
